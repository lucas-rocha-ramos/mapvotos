    // --- 🚀 CONFIGURAÇÃO PWA (Progressive Web App) ---
    function setupPWA() {
        // 1. Injeta o Manifest Dinamicamente
        const manifest = {
            "name": "Painel Chico Guarnieri",
            "short_name": "Painel 2022",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#0a110d",

                "type": "image/png"
            }]
        };
        const manifestBlob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
        document.getElementById('manifest-link').href = URL.createObjectURL(manifestBlob);

        // 2. Regista o Service Worker para cache (Trabalha Offline/Instalação)
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(clients.claim()));
                self.addEventListener('fetch', (e) => {
                    e.respondWith(fetch(e.request).catch(() => caches.match(e.request)));
                });
            `;
            const swBlob = new Blob([swCode], {type: 'application/javascript'});
            navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW Registration failed:', err));
        }

        // Corrige a altura em browsers mobile (Chrome/Safari ignoram a barra de endereço no 100vh)
        const setVh = () => document.documentElement.style.setProperty('--vh', `${window.innerHeight}px`);
        window.addEventListener('resize', setVh);
        setVh();
    }
    setupPWA();

    // --- SISTEMA DE CORES ---
    function hexToRgb(hex) {
        let r = 0, g = 0, b = 0;
        if (hex.length === 4) { r = parseInt(hex[1]+hex[1], 16); g = parseInt(hex[2]+hex[2], 16); b = parseInt(hex[3]+hex[3], 16); } 
        else if (hex.length === 7) { r = parseInt(hex.substring(1,3), 16); g = parseInt(hex.substring(3,5), 16); b = parseInt(hex.substring(5,7), 16); }
        return `${r}, ${g}, ${b}`;
    }

    function applyTheme(hex) {
        const rgb = hexToRgb(hex);
        window.globalHex = hex; window.globalRgb = rgb;
        localStorage.setItem('themeColor', hex);

        let styleEl = document.getElementById('dynamic-theme');
        if (!styleEl) { styleEl = document.createElement('style'); styleEl.id = 'dynamic-theme'; document.head.appendChild(styleEl); }

        styleEl.innerHTML = `
            .text-emerald-400 { color: ${hex} !important; }
            .bg-emerald-500, .bg-emerald-600 { background-color: ${hex} !important; }
            .border-emerald-500, .border-emerald-400 { border-color: ${hex} !important; }
            .bg-emerald-500\\/20 { background-color: rgba(${rgb}, 0.2) !important; }
            .border-emerald-500\\/30 { border-color: rgba(${rgb}, 0.3) !important; }
            .city-item-active { background-color: rgba(${rgb}, 0.15) !important; border-color: rgba(${rgb}, 0.4) !important; }
            .city-item-active h3 { color: ${hex} !important; }
        `;

        REGION_DATA.forEach(d => d.color = hex);
        if (regionChartInstance) {
            regionChartInstance.data.datasets[0].backgroundColor = hex;
            regionChartInstance.update();
        }

        window.defaultStyle = { color: `rgba(${rgb}, 0.5)`, weight: 1.5, fillColor: '#0a110d', fillOpacity: 0.1 };
        window.highlightStyle = { color: `rgba(${rgb}, 0.8)`, weight: 2.5, fillColor: `rgba(${rgb}, 0.2)`, fillOpacity: 1 };
        
        if (window.geojsonLayer) window.geojsonLayer.setStyle(window.defaultStyle);
        if (typeof refreshMarkers === 'function') refreshMarkers();
    }

 Santa Helena|-10.85|-55.21,Nova Ubiratã|-13.04|-55.25,Nova Xavantina|-14.66|-52.34,Novo Horizonte do Norte|-11.38|-57.34,Novo Mundo|-9.94|-55.21,Novo Santo Antônio|-12.28|-50.93,Novo São Joaquim|-14.90|-53.01,Paranaíta|-9.66|-56.47,Pedra Preta|-16.62|-54.47,Peixoto de Azevedo|-10.22|-54.97,Planalto da Serra|-14.30|-54.88,Pontal do Araguaia|-15.82|-52.26,Ponte Branca|-16.74|-53.07,Pontes e Lacerda|-15.22|-59.33,Porto Alegre do Norte|-10.58|-51.62,Porto dos Gaúchos|-11.53|-57.41,Porto Esperidião|-15.85|-58.46,Porto Estrela|-15.32|-57.22,Poxoréu|-15.83|-54.38,Primavera do Leste|-15.55|-54.29,Reserva do Cabaçal|-15.03|-58.39,Ribeirão Cascalheira|-12.91|-51.82,Ribeirãozinho|-16.48|-52.68,Rio Branco|-15.24|-58.11,Rondolândia|-9.80|-61.12,Rondonópolis|-16.46|-54.63,Rosário Oeste|-14.83|-56.42,Salto do Céu|-15.13|-58.13,Santa Carmem|-11.95|-55.26,Santa Cruz do Xingu|-9.73|-52.31,Santa Rita do Trivelato|-13.80|-55.21,Santa Terezinha|-10.47|-50.51,Santo Afonso|-14.39|-57.11,Santo Antônio do Leste|-14.81|-53.60,Santo Antônio do Leverger|-15.86|-56.07,São Félix do Araguaia|-11.61|-50.66,São José do Povo|-16.46|-54.25,São José do Rio Claro|-13.44|-56.72,São José dos Quatro Marcos|-15.62|-58.28,São Pedro da Cipa|-16.02|-54.90,Sapezal|-13.54|-58.81,Serra Nova Dourada|-12.87|-51.38,Sinop|-11.85|-55.50,Sorriso|-12.54|-55.72,Tabaporã|-11.29|-56.84,Tapurah|-12.82|-56.55,Terra Nova do Norte|-10.49|-55.23,Tesouro|-16.03|-53.51,Torixoréu|-16.20|-52.54,União do Sul|-11.53|-54.35,Vale de São Domingos|-15.12|-58.96,Vera|-12.30|-55.31,Vila Bela da Santíssima Trindade|-15.00|-59.95,Vila Rica|-10.01|-51.11";

    let CITIES_DATA = [...KNOWN_CITIES, ...EXTRA_CITIES_STR.split(',').map((item, index) => {
        const [name, lat, lng] = item.split('|');
        return { name, lat: parseFloat(lat), lng: parseFloat(lng), region: 'Outras Regiões', initialVotes: 0, population: 0 };
    })].filter((v, i, a) => a.findIndex(t => (t.name === v.name)) === i).map((city, index) => {
        let votes = city.initialVotes;
        return { ...city, id: index + 1, votes: votes, turnout: (votes > 0 && city.population > 0) ? ((votes / (city.population * 0.7)) * 100).toFixed(2) : '0.00' }
    }).sort((a, b) => b.votes - a.votes);

    // Variáveis Globais
    let currentSelectedCityId = null;
    let map, regionChartInstance;
    let leafletMarkers = new Map();
    let REGION_DATA = [
      { name: 'Região Oeste', votes: 0, color: '#10b981' }, { name: 'Vale do R. Cuiabá', votes: 0, color: '#34d399' }, 
      { name: 'Médio Norte', votes: 0, color: '#6ee7b7' }, { name: 'Região Norte', votes: 0, color: '#a7f3d0' }, { name: 'Outras Regiões', votes: 0, color: '#047857' }
    ];

    // --- CARREGAR DB ---
    async function loadDataFromSheets() {
        if (SCRIPT_URL.includes('COLE_AQUI')) return;
        try {
            const res = await fetch(SCRIPT_URL); const data = await res.json();
            if (data && data.length > 0) {
                let hasChanges = false;
                data.forEach(remoteCity => {
                    if (remoteCity.name === "_CONFIG_THEME_" && remoteCity.region) {
                        applyTheme(remoteCity.region); document.getElementById('adminThemeColor').value = remoteCity.region;
                    } else {
                        const localCity = CITIES_DATA.find(c => c.name === remoteCity.name);
                        if (localCity) {
                            localCity.votes = parseInt(remoteCity.votes) || 0; localCity.population = parseInt(remoteCity.population) || localCity.population;
                            localCity.turnout = (localCity.votes > 0 && localCity.population > 0) ? ((localCity.votes / (localCity.population * 0.7)) * 100).toFixed(2) : '0.00';
                            hasChanges = true;
                        }
                    }
                });
                if (hasChanges) {
                    CITIES_DATA.sort((a, b) => b.votes - a.votes);
                    updateChartAndSummary(); renderCities(document.getElementById('searchInput').value); refreshMarkers();
                }
            }
        } catch (e) { console.error("Falha DB:", e); }
    }

    // --- MAPA LEAFLET RESILIENTE ---
    function initMap() {
        const mapContainer = document.getElementById('map');
        
        map = L.map(mapContainer, {
            zoomControl: false, attributionControl: false, fadeAnimation: false,
            maxBounds: L.latLngBounds(L.latLng(-18.5, -62.0), L.latLng(-7.0, -49.5)), maxBoundsViscosity: 1.0, minZoom: 4, maxZoom: 10
        }).setView([-13.0, -56.0], window.innerWidth < 768 ? 5 : 6); // Zoom dinâmico mobile/desktop

        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', { maxZoom: 19, subdomains: 'abcd' }).addTo(map);

        fetch('https://servicodados.ibge.gov.br/api/v3/malhas/estados/51?formato=application/vnd.geo+json&resolucao=5')
            .then(res => res.ok ? res.json() : Promise.reject())
            .then(data => {
                window.defaultStyle = { color: 'rgba(52, 211, 153, 0.4)', weight: 1.5, fillColor: 'transparent' };
                window.highlightStyle = { color: 'rgba(52, 211, 153, 0.8)', weight: 2, fillColor: 'rgba(16, 185, 129, 0.1)', fillOpacity: 1 };
                window.geojsonLayer = L.geoJSON(data, {
                    style: window.defaultStyle,
                    onEachFeature: (feature, layer) => {
                        layer.on({
                            mouseover: (e) => { e.target.setStyle(window.highlightStyle); if (!L.Browser.ie && !L.Browser.edge) e.target.bringToFront(); },
                            mouseout: (e) => window.geojsonLayer.resetStyle(e.target)
                        });
                    }
                }).addTo(map);
            })
            .catch(() => console.warn("Fronteira IBGE ignorada."))
            .finally(() => {
                const spinner = document.getElementById('loadingSpinner');
                if (spinner) spinner.style.display = 'none';
                map.invalidateSize();
            });

        CITIES_DATA.forEach(city => {
            const icon = L.divIcon({ className: 'custom-leaflet-marker', html: getMarkerHtml(city, false), iconSize: [0, 0] });
            const marker = L.marker([city.lat, city.lng], { icon }).addTo(map);
            marker.on('click', () => openCityModal(city.id));
            leafletMarkers.set(city.id, marker);
        });

        // O SEGREDO DO PWA: Forçar o redimensionamento do mapa constantemente para evitar blocos cinzentos
        new ResizeObserver(() => { if (map) map.invalidateSize(); }).observe(mapContainer);
        setTimeout(() => map.invalidateSize(), 500);
    }

    function getMarkerHtml(city, isSelected) {
        let isZero = city.votes === 0; let size = isZero ? 6 : (city.votes > 1000 ? 30 : (city.votes > 100 ? 20 : (city.votes > 15 ? 14 : 10)));
        const currentRgb = window.globalRgb || '16, 185, 129';
        const pingHtml = (!isZero && isSelected) ? `<div class="absolute inset-0 bg-emerald-500/40 rounded-full animate-ping" style="padding: ${size/2}px; top: -${size/2}px; left: -${size/2}px; width: ${size*2}px; height: ${size*2}px;"></div>` : '';
        const bgClass = isZero ? 'bg-white/10 border-white/5' : (isSelected ? 'bg-emerald-500 border-white z-[1000]' : 'bg-emerald-500/40 border-emerald-400/80 z-[50]');
        const label = (!isSelected && city.votes > 1000) ? `<span class="absolute -top-5 left-1/2 -translate-x-1/2 text-[9px] font-bold text-white/80 whitespace-nowrap">${city.name}</span>` : '';
        
        return `<div class="relative flex items-center justify-center">
                  ${pingHtml}
                  <div class="absolute rounded-full border border-solid backdrop-blur-sm transition-all flex items-center justify-center ${bgClass}" 
                       style="width: ${size}px; height: ${size}px; top: -${size/2}px; left: -${size/2}px; box-shadow: 0 0 10px rgba(${currentRgb}, ${isZero?0:0.4});">
                  </div>${label}
                </div>`;
    }

    function refreshMarkers() {
        CITIES_DATA.forEach(city => {
            const m = leafletMarkers.get(city.id);
            if (m) m.setIcon(L.divIcon({ className: 'custom-leaflet-marker', html: getMarkerHtml(city, currentSelectedCityId === city.id), iconSize: [0,0] }));
        });
    }

    // --- RENDERIZAÇÃO E MODAIS ---
    function renderCities(search = "") {
        const container = document.getElementById('cityList'); container.innerHTML = '';
        CITIES_DATA.filter(c => c.name.toLowerCase().includes(search.toLowerCase())).forEach(city => {
            const div = document.createElement('div');
            div.className = "city-item cursor-pointer rounded-xl p-3 mb-1.5 transition-colors border border-transparent hover:bg-white/5";
            div.dataset.id = city.id;
            const fill = Math.min(100, Math.max(0, (city.votes / (CITIES_DATA[0]?.votes || 6302)) * 100));
            
            div.innerHTML = `
                <div class="flex justify-between items-center mb-1.5">
                    <h3 class="font-medium text-sm ${city.votes===0?'text-white/40':'text-white/90'}">${city.name}</h3>
                    <p class="font-bold text-base ${city.votes>0?'text-emerald-400':'text-white/20'}">${formatNumber(city.votes)}</p>
                </div>
                ${city.votes > 0 ? `<div class="w-full h-1 bg-black/40 rounded-full"><div class="h-full bg-emerald-500 rounded-full" style="width: ${fill}%"></div></div>` : ''}`;
            
            div.addEventListener('click', () => { 
                currentSelectedCityId = city.id; refreshMarkers(); 
                if (map) map.setView([city.lat, city.lng], 8, { animate: true });
                openCityModal(city.id); 
            });
            container.appendChild(div);
        });
    }

    function openCityModal(id) {
        const city = CITIES_DATA.find(c => c.id == id); if (!city) return;
        document.getElementById('modalCityName').textContent = city.name;
        document.getElementById('modalCityRegion').textContent = city.region;
        document.getElementById('modalCityPop').textContent = formatNumber(city.population);
        document.getElementById('modalCityVotes').textContent = formatNumber(city.votes);
        document.getElementById('modalCityTurnout').textContent = `${city.turnout}%`;
        const m = document.getElementById('cityInfoModal'); m.classList.remove('hidden'); setTimeout(() => { m.classList.remove('opacity-0'); m.children[0].classList.remove('scale-95'); }, 10);
    }
    function closeCityModal() {
        currentSelectedCityId = null; refreshMarkers();
        const m = document.getElementById('cityInfoModal'); m.classList.add('opacity-0'); m.children[0].classList.add('scale-95'); setTimeout(() => m.classList.add('hidden'), 200);
    }

    function updateChartAndSummary() {
        let total = 0; let m = { 'Região Oeste':0, 'Vale do R. Cuiabá':0, 'Médio Norte':0, 'Região Norte':0, 'Outras Regiões':0 };
        CITIES_DATA.forEach(c => { m[m.hasOwnProperty(c.region) ? c.region : 'Outras Regiões'] += c.votes; total += c.votes; });
        REGION_DATA.forEach((r, i) => r.votes = Object.values(m)[i]);
        document.getElementById('totalVotesDisplay').textContent = formatNumber(total);
        if(CITIES_DATA.length > 0 && CITIES_DATA[0].votes > 0) {
            document.getElementById('topCityName').textContent = CITIES_DATA[0].name;
            document.getElementById('topCityVotes').textContent = formatNumber(CITIES_DATA[0].votes) + ' votos';
        } else {
            document.getElementById('topCityName').textContent = 'Nenhum Voto';
            document.getElementById('topCityVotes').textContent = '0 votos';
        }
        if (regionChartInstance) { regionChartInstance.data.datasets[0].data = REGION_DATA.map(d => d.votes); regionChartInstance.update(); } 
        else { initChart(); }
    }

    function initChart() {
        const ctx = document.getElementById('regionChart'); if(!ctx) return;
        regionChartInstance = new Chart(ctx.getContext('2d'), {
            type: 'bar',
            data: { labels: REGION_DATA.map(d=>d.name), datasets: [{ data: REGION_DATA.map(d=>d.votes), backgroundColor: window.globalHex || '#10b981', borderRadius: 4 }] },
            options: { indexAxis: 'y', responsive: true, maintainAspectRatio: false, plugins: { legend: {display: false} }, scales: { x: {display:false}, y:{ border:{display:false}, grid:{display:false}, ticks:{color:'rgba(255,255,255,0.6)', font:{size:10}} } } }
        });
    }

    // --- ADMIN (Simples) ---
    function attemptLogin() { if(document.getElementById('adminPassword').value === 'Chico2026') { document.getElementById('loginModal').classList.add('hidden'); document.getElementById('adminModal').classList.remove('hidden'); const s = document.getElementById('adminCitySelect'); s.innerHTML=''; [...CITIES_DATA].sort((a,b)=>a.name.localeCompare(b.name)).forEach(c => s.appendChild(new Option(c.name, c.id))); updateAdminInput(); } else alert('Senha incorreta!'); }
    function updateAdminInput() { const c = CITIES_DATA.find(c => c.id == document.getElementById('adminCitySelect').value); if(c) { document.getElementById('adminVotesInput').value = c.votes; document.getElementById('adminPopInput').value = c.population; } }
    async function saveAdminVotes() {
        const c = CITIES_DATA.find(c => c.id == document.getElementById('adminCitySelect').value);
        if(c) {
            c.votes = parseInt(document.getElementById('adminVotesInput').value)||0; c.population = parseInt(document.getElementById('adminPopInput').value)||1;
            c.turnout = (c.votes > 0 && c.population > 0) ? ((c.votes / (c.population * 0.7)) * 100).toFixed(2) : '0.00';
            applyTheme(document.getElementById('adminThemeColor').value); CITIES_DATA.sort((a,b)=>b.votes-a.votes); renderCities(); updateChartAndSummary(); refreshMarkers();
            alert("Salvo localmente! Configurar URL Script para nuvem.");
        }
    }

    // ARRANQUE
    document.addEventListener('DOMContentLoaded', async () => {
        applyTheme(localStorage.getItem('themeColor') || '#10b981');
        
        // Renderiza o mapa e as listas zeradas primeiro
        initMap(); 
        updateChartAndSummary(); 
        renderCities(); 
        
        document.getElementById('searchInput').addEventListener('input', e => renderCities(e.target.value));
        
        // Puxa os dados reais e atualiza silenciosamente
        await loadDataFromSheets();
    });
  </script>
